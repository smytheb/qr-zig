name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - run: zig fmt --check src
      - run: zig build test
      # Optional: the Python oracle (needs `pip install qrcode`)
      - run: pip install qrcode && python3 scripts/oracle_check.py
